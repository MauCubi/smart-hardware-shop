version: '3.8'

services:
  hardware-db:
    image: postgres:16
    container_name: hardware-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      TZ: "America/Argentina/Buenos_Aires"
    ports:
      - "5433:5432"
    volumes:
      - hardware_data:/var/lib/postgresql/data

volumes:
  hardware_data: